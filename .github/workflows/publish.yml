name: Publish Speculynx

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build and test distributions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m pip install .
      - name: Run CLI tests
        run: python -m unittest discover -s tests -v
      - name: Build fresh distributions
        run: |
          rm -rf dist build src/*.egg-info
          python -m build
      - name: Check distribution metadata
        run: python -m twine check dist/*
      - name: Validate tag, package metadata, and CLI versions
        id: release
        shell: bash
        env:
          REF_TYPE: ${{ github.ref_type }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$REF_TYPE" != "tag" || "$TAG_NAME" != v* ]]; then
            echo "Release workflow must run from a v* tag." >&2
            exit 2
          fi

          python -m pip install --force-reinstall --no-deps dist/*.whl

          package_version="$(python -c 'from importlib.metadata import version; print(version("speculynx"))')"
          project_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          cli_version="$(speculynx --version)"
          tag_version="${TAG_NAME#v}"

          if [[ -z "$tag_version" ]]; then
            echo "The release tag has no version." >&2
            exit 2
          fi

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag version ($tag_version) differs from package metadata ($package_version)." >&2
            exit 2
          fi
          if [[ "$project_version" != "$package_version" ]]; then
            echo "pyproject.toml version ($project_version) differs from package metadata ($package_version)." >&2
            exit 2
          fi
          if [[ "$cli_version" != "$package_version" ]]; then
            echo "speculynx --version ($cli_version) differs from package metadata ($package_version)." >&2
            exit 2
          fi

          echo "version=$package_version" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: speculynx-${{ steps.release.outputs.version }}
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/speculynx/${{ needs.build.outputs.version }}/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: speculynx-${{ needs.build.outputs.version }}
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
