openapi: 3.0.0
info:
  title: Safe Query API
  version: 1.0.0
servers:
  - url: https://api.example.test
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Token expires after 15 minutes.
security:
  - BearerAuth: []
paths:
  /items:
    get:
      parameters:
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
