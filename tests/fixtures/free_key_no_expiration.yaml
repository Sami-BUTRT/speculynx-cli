openapi: 3.0.0
info:
  title: Static Key API
  version: 1.0.0
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Static API key for clients.
security:
  - ApiKeyAuth: []
paths:
  /items:
    get:
      responses:
        "200":
          description: OK
