openapi: 3.0.3
info:
  title: Placeholder Secrets API
  version: 1.0.0
servers:
  - url: https://api.example.test
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: JWT expires after 15 minutes.
  schemas:
    PlaceholderConfig:
      type: object
      properties:
        api_key:
          type: string
          example: your-api-key
          enum:
            - REDACTED
            - <token>
            - changeme
            - example
            - placeholder
            - string
security:
  - BearerAuth: []
paths:
  /config-template:
    get:
      tags:
        - config
      responses:
        "200":
          description: Template
