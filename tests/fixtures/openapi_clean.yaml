openapi: 3.0.3
info:
  title: Clean Speculynx API
  version: 1.2.0
servers:
  - url: https://api.example.test
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: Access token expires after 15 minutes and supports refresh.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.example.test/oauth/authorize
          tokenUrl: https://auth.example.test/oauth/token
          scopes:
            catalog:read: Read catalog entries
security:
  - OAuth2:
      - catalog:read
paths:
  /health:
    get:
      security: []
      tags:
        - system
      responses:
        "200":
          description: OK
  /catalog:
    get:
      tags:
        - catalog
      responses:
        "200":
          description: Public catalog summary
