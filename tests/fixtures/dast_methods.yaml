openapi: 3.0.0
info:
  title: DAST Methods API
  version: 1.0.0
paths:
  /items/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      responses:
        "200":
          description: OK
    post:
      responses:
        "201":
          description: Created
    put:
      responses:
        "200":
          description: Updated
    patch:
      responses:
        "200":
          description: Patched
    delete:
      responses:
        "204":
          description: Deleted
