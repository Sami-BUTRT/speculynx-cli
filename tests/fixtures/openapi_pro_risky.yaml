openapi: 3.0.3
info:
  title: Risky Pro Speculynx API
  version: ""
servers:
  - url: https://api.example.test
components:
  schemas:
    UserSecret:
      type: object
      properties:
        id:
          type: string
        password:
          type: string
        private_key:
          type: string
        email:
          type: string
    WebhookRegistration:
      type: object
      properties:
        callbackUrl:
          type: string
          format: uri
    TokenExample:
      type: object
      properties:
        api_key:
          type: string
          example: sk_live_1234567890abcdef
        github_token:
          type: string
          default: ghp_1234567890abcdef1234567890abcdef
        pat:
          type: string
          example: github_pat_1234567890abcdef1234567890abcdef
        aws_key:
          type: string
          example: AKIA1234567890ABCDEF
        bearer:
          type: string
          example: Bearer abcdefghijklmnopqrstuvwxyz1234567890
        jwt:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0.signature123456
paths:
  /users/{userId}:
    get:
      tags:
        - users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User with sensitive fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSecret"
  /admin/users/{userId}/role:
    patch:
      operationId: updateRole
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Role updated
  /webhooks/import:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookRegistration"
      responses:
        "202":
          description: Accepted
  /login:
    post:
      responses:
        "200":
          description: Logged in
  /password-reset:
    post:
      responses:
        "200":
          description: Reset requested
  /otp:
    post:
      responses:
        "200":
          description: OTP verified
  /search:
    get:
      responses:
        "200":
          description: Search completed
  /export:
    get:
      responses:
        "200":
          description: Export completed
  /generate:
    post:
      responses:
        "200":
          description: Generated
  /v1/legacy:
    get:
      deprecated: true
      responses:
        "200":
          description: Legacy
  /v2/legacy:
    get:
      responses:
        "200":
          description: Current
